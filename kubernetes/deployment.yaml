apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-ai-starter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nestjs-ai-starter
  template:
    metadata:
      labels:
        app: nestjs-ai-starter
    spec:
      containers:
        - name: api
          image: nestjs-ai-starter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nestjs-ai-starter-config
            - secretRef:
                name: nestjs-ai-starter-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nestjs-ai-starter
spec:
  selector:
    app: nestjs-ai-starter
  ports:
    - port: 80
      targetPort: 3000
